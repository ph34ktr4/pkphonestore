<section class="hero">
	<h1>Welcome to PK Phone Store</h1>
	<p>Latest phones from our MongoDB catalog.</p>
</section>

<section class="section">
	<div class="sectionHeader">
		<h2>Featured Phones</h2>
	</div>

	<p class="error" *ngIf="errorMessage">{{ errorMessage }}</p>

	<div class="grid">
		<ng-container *ngIf="products.length; else loadingOrEmpty">
			<app-product-card *ngFor="let p of products" [product]="p"></app-product-card>
		</ng-container>
	</div>

	<ng-template #loadingOrEmpty>
		<div class="grid" *ngIf="isLoading; else empty">
			<div class="skeletonCard" *ngFor="let _ of [1,2,3,4,5,6,7,8]"></div>
		</div>
	</ng-template>

	<ng-template #empty>
		<p class="muted">No products yet. Add some in the database.</p>
	</ng-template>
</section>
